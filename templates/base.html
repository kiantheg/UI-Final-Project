<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Cookieria Simulator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="{{ url_for('static', filename='main.css') }}">
</head>

<body>
<nav class="navbar navbar-expand-lg cookie-nav">
  <div class="container app-shell cookie-nav__inner">
    <a class="navbar-brand" href="{{ url_for('home') }}">
      <span class="brand-kicker">guided baking lab</span>
      <span class="brand-title">COOKIERIA SIMULATOR</span>
    </a>

    <div class="navbar-nav app-nav">
      <a class="nav-link" href="{{ url_for('home') }}">Home</a>
      <a class="nav-link" href="{{ url_for('learn_step', step=1) }}">Learning</a>
      <a class="nav-link" href="{{ url_for('quiz_step', step=1) }}">Quiz</a>
    </div>
  </div>
</nav>

<main class="container app-shell app-main">
  {% block content %}{% endblock %}
</main>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

{% block scripts %}{% endblock %}
</body>
</html>
