<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Cookieria Simulator</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet"
        href="{{ url_for('static', filename='main.css') }}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm">  <div class="container">

    <a class="navbar-brand fw-bold"
       href="{{ url_for('home') }}">
      Cookie Simulator
    </a>

    <div class="navbar-nav ms-auto d-flex flex-row gap-3">

      <a class="nav-link" href="{{ url_for('home') }}">Home</a>

      <!-- KEEP ORIGINAL ROUTE SAFE -->
      <a class="nav-link"
         href="{{ url_for('learn_step', step=1) }}">
        Learning
      </a>

      <a class="nav-link" href="{{ url_for('quiz_step', step=1) }}">Quiz</a>
    </div>

  </div>
</nav>

<!-- PAGE CONTENT -->
<main class="container py-5">
  {% block content %}{% endblock %}
</main>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

{% block scripts %}{% endblock %}

</body>
</html>
