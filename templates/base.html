<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cookeria Simulator{% endblock %}</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;700;900&family=Roboto+Mono:wght@400;500;700&family=Silkscreen:wght@400;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
</head>
<body class="{% block body_class %}{% endblock %}">
  <nav class="cookie-nav">
    <div class="cookie-nav-inner">
      <a class="cookie-brand" href="{{ url_for('home') }}">
        <span class="cookie-brand-main">Cookeria Simulator</span>
      </a>

      <div class="cookie-nav-links">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('learn_step', step=1) }}">Learn</a>
        <a href="{{ url_for('simulator') }}">Simulator</a>
        <a href="{{ url_for('quiz_step', step=1) }}">Quiz</a>
      </div>
    </div>
  </nav>

  <main class="app-main {% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
